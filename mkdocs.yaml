site_name: Forensic Examiner
site_description: The Swiss Army Knife for examining text files.
site_author: Christian Uhsat
site_url: https://forensic-examiner.eu/

repo_name: github.com/cuhsat/fox
repo_url: https://github.com/cuhsat/fox

remote_branch: docs

copyright: © 2025 Soli Deo Gloria

markdown_extensions:
  - admonition
  - attr_list

nav:
  - Home: index.md

  - Getting started:
    - Installation: start/install.md
    - Tutorial: start/tutorial.md

    - Usage:
      - fox: start/usage/fox.md
      - fox compare: start/usage/compare.md
      - fox counts: start/usage/counts.md
      - fox deflate: start/usage/deflate.md
      - fox entropy: start/usage/entropy.md
      - fox hash: start/usage/hash.md
      - fox strings: start/usage/strings.md
      - fox timeline: start/usage/timeline.md

  - Features:
    - Filesystem: features/filesystem.md
    - Evidence: features/evidence.md

    - AI:
      - Assistant: features/ai/assistant.md

    - UI:
      - Terminal: features/ui/terminal.md
      - Unicode: features/ui/unicode.md

    - Mode:
      - Open: features/ui/open.md
      - Less: features/ui/less.md
      - Grep: features/ui/grep.md
      - Hex: features/ui/hex.md

  - Files:
    - Loader: files/loader.md

    - Text:
      - CSV: files/text/csv.md
      - JSON: files/text/json.md

    - Logs:
      - Linux: files/logs/linux.md
      - Windows: files/logs/windows.md

  - Utils:
    - Deflate: utils/deflate.md
    - Compare: utils/compare.md
    - Counts: utils/counts.md
    - Entropy: utils/entropy.md
    - Hashes: utils/hashes.md
    - Strings: utils/strings.md
    - Timeline: utils/timeline.md

  - Plugins:
    - Configuration: plugins/config.md

    - Ready-made:
      - Logs: plugins/ready/logs.md
      - Dissect: plugins/ready/dissect.md
      - Eric Zimmerman: plugins/ready/eztools.md
      - Reverse Engineering: plugins/ready/reverse.md

  - Themes:
    - Built-in: themes/builtin.md
    - Custom: themes/custom.md

  - Reference:
    - Keyboard: reference/keyboard.md
    - Mouse: reference/mouse.md

  - Resources:
    - Benchmark: resources/benchmark.md
    - Building: resources/building.md
    - License: resources/license.md

theme:
  name: material
  logo: fox.svg

  font:
    text: Roboto
    code: Roboto Mono

  icon:
    repo: fontawesome/brands/github
    admonition:
      tip: fontawesome/solid/lightbulb

  favicon: fox.ico

  features:
    - toc.follow
    - navigation.path
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - search.highlight
    - search.suggest

  palette:

    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: examiner-light
      primary: custom
      accent: custom
      toggle:
        icon: material/toggle-switch-off
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: examiner-dark
      primary: custom
      accent: custom
      toggle:
        icon: material/toggle-switch
        name: Switch to system preference

extra:
  homepage: https://forensic-examiner.eu
  generator: false

  social:
    - icon: fontawesome/solid/envelope
      link: mailto:christian@uhsat.de
      name: Mail

    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/cuhsat
      name: LinkedIn

    - icon: fontawesome/brands/github
      link: https://github.com/cuhsat
      name: GitHub

extra_css:
  - assets/css/fox.css

plugins:
  - search
  - privacy
  - offline
